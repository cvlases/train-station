<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLV Navigation Demo — Train Station</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0c10;
        overflow: hidden;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      }

      canvas {
        display: block;
      }

      /* ── Tagline ─────────────────────────────────────────────── */
      #tagline {
        position: fixed;
        bottom: 24px;
        left: 32px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.28);
        line-height: 1.5;
        letter-spacing: 0.06em;
        pointer-events: none;
        z-index: 10;
      }

      /* ── Loading screen ──────────────────────────────────────── */
      #loader {
        position: fixed;
        inset: 0;
        background: #0a0c10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 100;
        transition: opacity 0.6s ease;
      }

      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loader span {
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.35);
      }

      .loader-bar {
        width: 180px;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 1px;
        overflow: hidden;
      }

      .loader-fill {
        height: 100%;
        width: 0%;
        background: rgba(255, 255, 255, 0.4);
        animation: load 1.8s ease forwards;
      }

      @keyframes load {
        to { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <span>Loading station model</span>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <div id="canvas-container"></div>

    <div id="tagline">Simulating spatial audio navigation for BLV users</div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
